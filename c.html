<script>

const plusButtons=document.querySelectorAll(".plus");
const minusButtons=document.querySelectorAll(".minus");

function updateTotal(){

let total=0;
let items=0;

document.querySelectorAll(".Cart-Items").forEach(item=>{

const count=parseInt(item.querySelector(".count").textContent);
const price=parseInt(item.querySelector(".amount").dataset.price);

total+=count*price;
items+=count;

});

document.querySelector(".total-amount").textContent=total+"¢";
document.querySelector(".items").textContent=items+" items";

}

plusButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

const count=btn.parentElement.querySelector(".count");

count.textContent=parseInt(count.textContent)+1;

updateTotal();

});

});

minusButtons.forEach(btn=>{

btn.addEventListener("click",()=>{

const count=btn.parentElement.querySelector(".count");

let value=parseInt(count.textContent);

if(value>0){

count.textContent=value-1;

updateTotal();

}

});

});

updateTotal();

</script>
